<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="dom.css" />
    <title>Workshop DOM</title>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">MyShop</a>
        <span class="navbar-text" id="total">Total: $0.00</span>
      </div>
    </nav>

    <!-- Cart -->
    <div id="cart" class="cart">
      <!-- Item 1 -->
      <div class="card product" style="width: 18rem">
        <img src="msi-katana-17.jpg" class="card-img-top" alt="msi-katana-17" />
        <div class="card-body">
          <h5 class="card-title">MSI Katana 17</h5>
          <p class="card-text">$<span class="price">1300</span></p>
          <div class="qty-box">
            <i class="fa-solid fa-plus"></i>
            <p class="quantity">1</p>
            <i class="fa-solid fa-minus"></i>
          </div>
          <div class="trash-like-box">
            <i class="fa-solid fa-trash"></i>
            <i class="fa-solid fa-heart"></i>
          </div>
        </div>
      </div>
      <!-- Item 2 -->
      <div class="card product" style="width: 18rem">
        <img
          id="ecran"
          src="msi-optix-g2412.jpg"
          class="card-img-top"
          alt="msi-optix-g2412"
        />
        <div class="card-body">
          <h5 class="card-title">MSI Optix G2412</h5>
          <p class="card-text">$<span class="price">200</span></p>
          <div class="qty-box">
            <i class="fa-solid fa-plus"></i>
            <p class="quantity">1</p>
            <i class="fa-solid fa-minus"></i>
          </div>
          <div class="trash-like-box">
            <i class="fa-solid fa-trash"></i>
            <i class="fa-solid fa-heart"></i>
          </div>
        </div>
      </div>
      <!-- Item 3 -->
      <div class="card product" style="width: 18rem">
        <img src="msi-rtx-4070.jpg" class="card-img-top" alt="msi-rtx-4070" />
        <div class="card-body">
          <h5 class="card-title">MSI RTX 4070</h5>
          <p class="card-text">$<span class="price">800</span></p>
          <div class="qty-box">
            <i class="fa-solid fa-plus"></i>
            <p class="quantity">1</p>
            <i class="fa-solid fa-minus"></i>
          </div>
          <div class="trash-like-box">
            <i class="fa-solid fa-trash"></i>
            <i class="fa-solid fa-heart" id="icon"></i>
          </div>
        </div>
      </div>
      <!-- Item 4 -->
      <div class="card product" style="width: 18rem">
        <img src="msi-katana-17.jpg" class="card-img-top" alt="" />
        <div class="card-body" id="card-body">
          <h5 class="card-title">MSI Katana 17</h5>
          <p class="card-text">$<span class="price">1300</span></p>
          <div class="qty-box">
            <i class="fa-solid fa-plus"></i>
            <p class="quantity">1</p>
            <i class="fa-solid fa-minus"></i>
          </div>
          <!-- <div class="trash-like-box">
          <i class="fa-solid fa-trash"></i>
          <i class="fa-solid fa-heart"></i>
        </div> -->
        </div>
      </div>
    </div>

    <form name="loginForm" id="loginForm">
      <label for="Name">Name:</label>
      <input type="text" name="name" placeholder="example@example.com" />
      <label for="password">Password:</label>
      <input type="password" name="password" placeholder="*********" />
      <button type="submit">Login</button>
      <button type="reset">cancel</button>
    </form>

    <script src="dom.js"></script>
  </body>
</html>
